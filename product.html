let id = localStorage.getItem("product")

let cart = JSON.parse(localStorage.getItem("cart")) || []

let item = items.find(x=>x.id==id)

document.getElementById("name").innerText=item.name
document.getElementById("price").innerText="₹"+item.price
document.getElementById("desc").innerText=item.desc

function getQty(){

let c = cart.find(x=>x.id==id)

return c ? c.qty : 0

}

function show(){

let q = getQty()

if(q==0){

document.getElementById("cartArea").innerHTML=

`<button onclick="add()">Add to Cart</button>`

}else{

document.getElementById("cartArea").innerHTML=

`
<button onclick="dec()">-</button>
<span class="qty">${q}</span>
<button onclick="inc()">+</button>
`

}

}

show()

function save(){

localStorage.setItem("cart",JSON.stringify(cart))

show()

}

function add(){

cart.push({...item,qty:1})

save()

}

function inc(){

let c = cart.find(x=>x.id==id)

c.qty++

save()

}

function dec(){

let c = cart.find(x=>x.id==id)

c.qty--

if(c.qty<=0){

cart = cart.filter(x=>x.id!=id)

}

save()

}
