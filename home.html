let cart = JSON.parse(localStorage.getItem("cart")) || []

function getQty(id){

let item = cart.find(x=>x.id==id)

return item ? item.qty : 0

}

function show(list){

let data=""

list.forEach(e=>{

let q = getQty(e.id)

data+=`

<div class="card">

<h3 onclick="openProduct(${e.id})">${e.name}</h3>

<p>₹${e.price}</p>

<div id="cart${e.id}">

${q==0 ?

`<button class="add" onclick="add(${e.id})">Add to Cart</button>`

:

`<button onclick="dec(${e.id})">-</button>
<span class="qty">${q}</span>
<button onclick="inc(${e.id})">+</button>`

}

</div>

</div>

`

})

document.getElementById("products").innerHTML=data

}

show(items)

function save(){

localStorage.setItem("cart",JSON.stringify(cart))

show(items)

}

function add(id){

let item = cart.find(x=>x.id==id)

if(item){

item.qty++

}else{

let food = items.find(x=>x.id==id)

cart.push({...food,qty:1})

}

save()

}

function inc(id){

let item = cart.find(x=>x.id==id)

item.qty++

save()

}

function dec(id){

let item = cart.find(x=>x.id==id)

item.qty--

if(item.qty<=0){

cart = cart.filter(x=>x.id!=id)

}

save()

}

function openProduct(id){

localStorage.setItem("product",id)

location.href="product.html"

}

function filter(cat){

if(cat=="All"){

show(items)

}else{

let f = items.filter(x=>x.cat==cat)

show(f)

}

}

function searchFood(){

let s = document.getElementById("search").value.toLowerCase()

let f = items.filter(x=>x.name.toLowerCase().includes(s))

show(f)

}
