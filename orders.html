<!DOCTYPE html>
<html>
<head>
<title>Orders</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#ff6f00;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:20px;
margin-bottom:70px;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

button{
background:red;
color:white;
border:none;
padding:8px 15px;
margin-top:10px;
border-radius:5px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -2px 6px rgba(0,0,0,0.2);
}

.bottom-nav a{
text-decoration:none;
color:#333;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
My Orders
</div>

<div class="container" id="ordersBox"></div>

<div class="bottom-nav">
<a href="home.html">Home</a>
<a href="cart.html">Cart</a>
<a href="orders.html">Orders</a>
<a href="user.html">User</a>
</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || []

let box = document.getElementById("ordersBox")

function loadOrders(){

box.innerHTML=""

if(orders.length==0){
box.innerHTML="<h3>No Orders Yet</h3>"
return
}

orders.forEach((o,i)=>{

let items=""

o.items.forEach(p=>{
items+=p.name+" x "+p.qty+"<br>"
})

box.innerHTML+=`

<div class="order">

<b>Order ID:</b> ${o.id} <br><br>

${items}

<br>

<b>Name:</b> ${o.name} <br>
<b>Phone:</b> ${o.phone} <br>
<b>Address:</b> ${o.address} <br>

<br>

Status: ${o.status}

<br>

<button onclick="cancelOrder(${i})">
Cancel Order
</button>

</div>

`

})

}

function cancelOrder(i){

let o = orders[i]

o.status="Cancelled"

localStorage.setItem("orders",JSON.stringify(orders))

let items=""

o.items.forEach(p=>{
items+=p.name+" x "+p.qty+"%0A"
})

let msg="ORDER CANCELLED %0A%0A"+items+
"%0AName:"+o.name+
"%0APhone:"+o.phone+
"%0AAddress:"+o.address

window.open("https://wa.me/916393884280?text="+msg)

loadOrders()

}

loadOrders()

</script>

</body>
</html>
