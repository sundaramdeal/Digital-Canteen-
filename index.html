<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Canteen</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff66b2,#ffffff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:300px;
}

h1{
color:#ff2e8b;
font-size:32px;
margin-bottom:20px;
}

.emoji{
font-size:60px;
margin:10px;
}

.shop{
font-size:20px;
margin-bottom:20px;
}

button{
background:#ff2e8b;
color:white;
border:none;
padding:12px 30px;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ff0077;
}

.info{
margin-top:20px;
font-size:14px;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<h1>Welcome to Digital Canteen</h1>

<div class="emoji">🛍️</div>

<div class="shop">Shop Now</div>

<a href="home.html">
<button>Open Now</button>
</a>

<div class="info">
Daily Items | Same Day Delivery | Cash on Delivery
</div>

</div>
